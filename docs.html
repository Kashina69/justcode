<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>justcode — Documentation</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-sidebar: #161b22;
    --bg-card: #1c2333;
    --bg-hover: #252d3f;
    --bg-code: #151b28;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #6e7681;
    --accent: #58a6ff;
    --accent-green: #3fb950;
    --accent-orange: #d29922;
    --accent-red: #f85149;
    --accent-purple: #bc8cff;
    --scrollbar: #30363d;
    --scrollbar-hover: #484f58;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    line-height: 1.6;
    font-size: 15px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 0;
    overflow-y: auto;
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header .logo {
    width: 24px;
    height: 24px;
    background: var(--accent);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--bg);
  }

  .sidebar-header .version {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
    margin-left: 32px;
  }

  .sidebar-nav {
    padding: 8px 0;
    flex: 1;
  }

  .nav-section {
    padding: 0;
  }

  .nav-item {
    display: block;
    padding: 6px 20px 6px 24px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    text-decoration: none;
  }

  .nav-item:hover {
    color: var(--text);
    background: var(--bg-hover);
  }

  .nav-item.active {
    color: var(--accent);
    background: rgba(88, 166, 255, 0.08);
    border-left-color: var(--accent);
    font-weight: 500;
  }

  .nav-category {
    padding: 16px 20px 4px 24px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .main {
    flex: 1;
    padding: 0;
    overflow-y: auto;
    height: 100vh;
  }

  .content {
    max-width: 860px;
    padding: 40px 48px 80px;
    margin: 0 auto;
  }

  .content h2 {
    font-size: 28px;
    font-weight: 600;
    margin-top: 0;
    margin-bottom: 8px;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .content h2 .anchor {
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
    margin-left: 6px;
    font-size: 20px;
    text-decoration: none;
  }

  .content h2:hover .anchor { opacity: 1; }

  .content .section-desc {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .content h3 {
    font-size: 20px;
    font-weight: 600;
    margin-top: 32px;
    margin-bottom: 12px;
    color: var(--text);
  }

  .content h4 {
    font-size: 16px;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .content p {
    margin-bottom: 16px;
    color: var(--text-dim);
  }

  .content p strong { color: var(--text); }

  .content a {
    color: var(--accent);
    text-decoration: none;
  }

  .content a:hover { text-decoration: underline; }

  .content ul, .content ol {
    margin-bottom: 16px;
    padding-left: 24px;
    color: var(--text-dim);
  }

  .content li { margin-bottom: 4px; }
  .content li strong { color: var(--text); }

  .code-block {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    tab-size: 2;
  }

  .code-block .kw { color: #ff7b72; }
  .code-block .str { color: #a5d6ff; }
  .code-block .fn { color: #d2a8ff; }
  .code-block .cm { color: #6e7681; font-style: italic; }
  .code-block .num { color: #79c0ff; }
  .code-block .prop { color: #79c0ff; }

  .inline-code {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', Consolas, monospace;
    font-size: 13px;
    color: var(--accent);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    font-size: 14px;
  }

  th, td {
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  th {
    background: var(--bg-sidebar);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
  }

  td { color: var(--text-dim); }
  td:first-child, td:nth-child(2) { color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  tr:hover td { background: rgba(88, 166, 255, 0.03); }

  .note {
    background: rgba(88, 166, 255, 0.08);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    margin-bottom: 20px;
    border-radius: 0 6px 6px 0;
    font-size: 14px;
    color: var(--text-dim);
  }

  .note strong { color: var(--accent); }

  .warning {
    background: rgba(210, 153, 34, 0.08);
    border-left: 3px solid var(--accent-orange);
    padding: 14px 18px;
    margin-bottom: 20px;
    border-radius: 0 6px 6px 0;
    font-size: 14px;
    color: var(--text-dim);
  }

  .warning strong { color: var(--accent-orange); }

  .danger {
    background: rgba(248, 81, 73, 0.08);
    border-left: 3px solid var(--accent-red);
    padding: 14px 18px;
    margin-bottom: 20px;
    border-radius: 0 6px 6px 0;
    font-size: 14px;
    color: var(--text-dim);
  }

  .danger strong { color: var(--accent-red); }

  .tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-right: 4px;
  }

  .tag-safe { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
  .tag-write { background: rgba(210, 153, 34, 0.15); color: var(--accent-orange); }
  .tag-danger { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }

  .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .feature-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: border-color 0.15s;
  }

  .feature-card:hover { border-color: var(--accent); }

  .feature-card h4 {
    margin-top: 0;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .feature-card p {
    margin-bottom: 0;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .cmd-group {
    margin-bottom: 24px;
  }

  .cmd-group h4 {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .cmd-group h4 .badge {
    font-size: 11px;
    font-weight: 500;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 1px 8px;
    border-radius: 4px;
    color: var(--text-muted);
  }

  .flow-diagram {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre;
    color: var(--text-dim);
  }

  .flow-diagram .hl { color: var(--accent); }
  .flow-diagram .ok { color: var(--accent-green); }
  .flow-diagram .warn { color: var(--accent-orange); }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .content { padding: 24px 20px 60px; }
  }

  .search-box {
    margin: 12px 16px;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    width: calc(100% - 32px);
    transition: border-color 0.15s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-muted); }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">
    <h1><span class="logo">j</span> justcode</h1>
    <div class="version">v0.1.0 &mdash; Documentation</div>
  </div>
  <input type="text" class="search-box" placeholder="Search docs..." id="searchBox" oninput="filterNav()">
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</div>
<div class="main">
  <div class="content" id="content"></div>
</div>

<script>
const DOCS = [
  {
    id: 'overview',

    description: 'What justcode is and how it works at a glance.',

      { type: 'heading', text: 'What is justcode?' },
      { type: 'paragraph', text: 'justcode is a <strong>terminal-based agentic AI coding assistant</strong>. You type code requests in natural language, and the agent plans, executes, and verifies code modifications — all within your terminal. It works with Anthropic Claude or any OpenAI-compatible API (DeepSeek, OpenAI, Ollama, etc.).' },
      { type: 'paragraph', text: 'justcode reads your codebase, executes shell commands, modifies files, and builds a structured memory of project decisions across sessions. It is designed for developers who want AI assistance without leaving the terminal.' },
      { type: 'heading', text: 'Key Capabilities' },
      { type: 'list', items: [
        '<strong>Autonomous task execution</strong> — reads, writes, edits files, and runs shell commands based on natural language requests',
        '<strong>Multi-model support</strong> — works with Anthropic Claude, OpenAI, DeepSeek, OpenRouter, Ollama, and any OpenAI-compatible API',
        '<strong>Three-tier safety gate</strong> — automatically classifies operations as safe, write, or dangerous before execution',
        '<strong>Structured memory graph</strong> — persistent interconnected knowledge nodes stored per-project with BFS recall',
        '<strong>Skills system</strong> — drop Markdown skill files into <code>skills/</code> to modify agent behavior',
        '<strong>Planning workflow</strong> — draft, critique, and save execution plans with <code>/plan</code>',
        '<strong>Database admin agent</strong> — interactive schema introspection, query execution, and AI DB design engineer',
        '<strong>Session persistence</strong> — save and resume past conversation histories with cost tracking',
        '<strong>Project context initialization</strong> — <code>/init</code> scans your codebase and generates context files for the agent',
        '<strong>Taste system</strong> — learns your preferences (framework, style, architecture) with confidence scores',
      ]},
      { type: 'heading', text: 'Architecture at a Glance' },
      { type: 'paragraph', text: 'justcode runs as an interactive REPL. User input is processed by the <strong>AgentOrchestrator</strong>, which injects project context (memory, plans, skills, taste preferences), calls the LLM provider, executes tool calls through the safety gate, and loops until the task completes.' },
      { type: 'code', lang: 'text', content: `User Input (REPL)\n       \u2502\n       \u2514\u2500 Slash command / inline mention? \u2192 handle locally\n       \u2502\n       \u25bc\nAgentOrchestrator.runTurn()\n       \u2502\n       \u251c\u2500 Load memory + taste + plans + skills\n       \u251c\u2500 Call LLM provider (Anthropic / OpenAI-compat)\n       \u251c\u2500 Parse tool calls \u2192 classify via SafetyGate\n       \u2514\u2500 Execute tools \u2192 recurse until done\n       \u2502\n       \u25bc\nREPL prompts for next input` },

  {

  {
    id: 'configuration',
    title: 'Configuration',
    category: 'Getting Started',
    description: 'API keys, model aliases, and provider settings.',
    blocks: [
      { type: 'heading', text: 'Configuration Sources' },
      { type: 'paragraph', text: 'justcode loads configuration from multiple sources, merged in order:' },
      { type: 'list', items: [
        '<strong>Environment variables</strong> — <code>ANTHROPIC_API_KEY</code>, <code>OPENAI_API_KEY</code>, <code>OPENAI_API_ENDPOINT</code>, <code>MODEL_FAST</code>, <code>MODEL_SMART</code>, <code>MODEL_PLANNER</code>',

      { type: 'paragraph', text: 'Three aliases route requests automatically based on query complexity:' },

    ]
  },
  {
    id: 'usage',
    title: 'How to Use',
    category: 'Using justcode',
    description: 'The REPL, prompting, and inline context injection.',
    blocks: [
      { type: 'heading', text: 'The REPL' },

// ---- Rendering Engine ----

function renderBlock(block) {
  switch (block.type) {
    case 'heading':
      return `<h3>${block.text}</h3>`;
    case 'subheading':
      return `<h4>${block.text}</h4>`;
    case 'paragraph':
      return `<p>${block.text}</p>`;
    case 'note':
      return `<div class="note">${block.text}</div>`;
    case 'warning':
      return `<div class="warning">${block.text}</div>`;
    case 'danger':
      return `<div class="danger">${block.text}</div>`;
    case 'list':
      return `<ul>${block.items.map(i => `<li>${i}</li>`).join('')}</ul>`;
    case 'code':
      return `<div class="code-block">${escapeHtml(block.content)}</div>`;
    case 'table':
      return `<table><thead><tr>${block.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>${block.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    case 'feature-grid':
      return `<div class="feature-grid">${block.items.map(i => `<div class="feature-card"><h4>${i.title}</h4><p>${i.desc}</p></div>`).join('')}</div>`;
    default:
      return '';
  }
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderSection(section) {
  const blocksHtml = section.blocks.map(b => renderBlock(b)).join('\n');
  return `<h2 id="${section.id}">${section.title} <a class="anchor" href="#${section.id}">#</a></h2>
          <div class="section-desc">${section.description}</div>
          ${blocksHtml}`;
}

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = DOCS.map(s => renderSection(s)).join('\n');

  const nav = document.getElementById('sidebarNav');
  let categories = {};
  DOCS.forEach(s => {
    const cat = s.category || 'General';
    if (!categories[cat]) categories[cat] = [];
    categories[cat].push(s);
  });

  let navHtml = '';
  for (const [cat, items] of Object.entries(categories)) {
    navHtml += `<div class="nav-category">${cat}</div>`;
    navHtml += `<div class="nav-section">`;
    items.forEach(s => {
      navHtml += `<a class="nav-item" href="#${s.id}" data-section="${s.id}">${s.title}</a>`;
    });
    navHtml += `</div>`;
  }
  nav.innerHTML = navHtml;

  // Active nav tracking
  const navItems = document.querySelectorAll('.nav-item');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.id;
        navItems.forEach(n => n.classList.remove('active'));
        const active = document.querySelector(`.nav-item[data-section="${id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px' });

  document.querySelectorAll('h2').forEach(h => observer.observe(h));

  // Click scroll
  navItems.forEach(n => {
    n.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(n.dataset.section);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        navItems.forEach(ni => ni.classList.remove('active'));
        n.classList.add('active');
      }
    });
  });
}

function filterNav() {
  const query = document.getElementById('searchBox').value.toLowerCase();
  const items = document.querySelectorAll('.nav-item');
  const categories = document.querySelectorAll('.nav-category');
  const sections = document.querySelectorAll('.nav-section');

  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    const parentSection = item.closest('.nav-section');
    if (text.includes(query)) {
      item.style.display = 'block';
      if (parentSection) parentSection.style.display = 'block';
    } else {
      item.style.display = 'none';
    }
  });

  // Hide empty sections and their category labels
  sections.forEach(section => {
    const visible = Array.from(section.querySelectorAll('.nav-item')).some(n => n.style.display !== 'none');
    section.style.display = visible ? 'block' : 'none';
  });

  categories.forEach(cat => {
    let next = cat.nextElementSibling;
    let hasVisible = false;
    while (next && next.classList.contains('nav-section')) {
      if (next.style.display !== 'none') { hasVisible = true; break; }
      next = next.nextElementSibling;
    }
    cat.style.display = hasVisible ? 'block' : 'none';
  });
}

document.addEventListener('DOMContentLoaded', renderAll);
</script>
</body>
